---
- name: Create generated directory for HAProxy
  ansible.builtin.file:
    path: "{{ haproxy_state_dir }}"
    state: directory
    mode: "0755"
  delegate_to: localhost

- name: Render HAProxy configuration
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: "{{ haproxy_state_dir }}/haproxy.cfg"
    mode: "0644"
  delegate_to: localhost
  notify: reload haproxy

- name: Install HAProxy when real mode is enabled
  ansible.builtin.package:
    name: haproxy
    state: present
  become: true
  when: ansible_manage_real_services | bool
