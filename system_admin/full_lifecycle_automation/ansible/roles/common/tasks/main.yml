---
- name: Create deployment group
  ansible.builtin.group:
    name: "{{ app_user }}"
    state: present

- name: Create deployment user
  ansible.builtin.user:
    name: "{{ app_user }}"
    group: "{{ app_user }}"
    shell: /bin/bash
    create_home: true
    state: present

- name: Create application directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0755"
  loop:
    - "{{ app_root }}"
    - "{{ app_root }}/logs"
    - "{{ app_root }}/compose"
